<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ห้องสมุดของเล่นศิริราช · Siriraj Toy Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Prompt:wght@300;400;500;600&family=Anuphan:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* small interaction polish that belongs with the shell */
    .itemcard:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--brand-soft-2) !important; }
    .cattile:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .navlink:hover { background: var(--bg-2) !important; color: var(--ink) !important; }
    .iconbtn:hover { border-color: var(--brand) !important; color: var(--brand) !important; }
    .histrow:hover { background: var(--bg) !important; }
    .arow:hover, .poptile:hover, .memrow:hover { background: var(--bg) !important; }
    .fchip { padding: 7px 13px; border-radius: 999px; border: 1px solid var(--line-2); background: var(--surface); font-size: 13px; font-weight: 500; color: var(--ink-2); cursor: pointer; transition: all .14s; }
    .fchip:hover { border-color: var(--brand); color: var(--brand-ink); }
    .fchip.on { background: var(--brand); border-color: var(--brand); color: #fff; }
    .agerange { -webkit-appearance: none; height: 6px; border-radius: 999px; background: var(--brand-soft-2); }
    .agerange::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 999px; background: var(--brand); border: 3px solid #fff; box-shadow: var(--shadow-sm); cursor: pointer; }
    .agerange::-moz-range-thumb { width: 18px; height: 18px; border-radius: 999px; background: var(--brand); border: 3px solid #fff; cursor: pointer; }
    table tbody tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#1f9c8f"/>
      <g fill="#fff" transform="translate(30 30)">
        <rect x="0" y="14" width="16" height="16" rx="3"/>
        <rect x="22" y="0" width="18" height="30" rx="3" fill="#f4b740"/>
        <rect x="0" y="34" width="16" height="6" rx="3" fill="#f1795a"/>
      </g>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="db.js"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

</body>
</html>
